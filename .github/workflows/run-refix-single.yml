name: Run Refix (Single PR)

on:
  check_suite:
    types: [completed]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'PR number to process'
        required: false
        type: number

concurrency:
  group: run-refix-pr-${{ github.event.pull_request.number || github.event.check_suite.pull_requests[0].number || inputs.pr-number || 'dispatch' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-refix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Generate config
        env:
          REFIX_CONFIG_YAML: ${{ vars.REFIX_CONFIG_YAML }}
        run: |
          if [ -z "$REFIX_CONFIG_YAML" ]; then
            echo "Error: REFIX_CONFIG_YAML is not set or empty" >&2
            exit 1
          fi
          printf '%s\n' "$REFIX_CONFIG_YAML" > .refix.yaml

      - uses: ./
        with:
          pr-number: ${{ github.event.pull_request.number || github.event.check_suite.pull_requests[0].number || inputs.pr-number }}
          gh-token: ${{ secrets.GH_TOKEN }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          config-path: ${{ github.workspace }}/.refix.yaml
