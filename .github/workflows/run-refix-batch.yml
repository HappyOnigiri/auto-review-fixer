name: Run Refix (Batch)

on:
  workflow_dispatch:

concurrency:
  group: run-refix-batch
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-refix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # NOTE: `uses: ./` references the checked-out action.yml on the current branch,
      # enabling testing of unreleased changes within this repository.
      # When using this file as a template in another repository,
      # change `./` to `HappyOnigiri/Refix@main` (or a specific version tag).
      - name: Run Refix
        uses: ./
        with:
          batch: "true"
          gh-token: ${{ secrets.GH_TOKEN }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          config-yaml: ${{ vars.REFIX_CONFIG_YAML }}
