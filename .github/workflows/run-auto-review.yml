name: Run auto review

on:
  workflow_dispatch:

concurrency:
  group: run-auto-review
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-auto-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.58

      - name: Configure git credentials
        run: git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Generate config.yaml from GitHub Variables
        env:
          REFIX_CONFIG_YAML: ${{ vars.REFIX_CONFIG_YAML }}
        run: printf '%s\n' "$REFIX_CONFIG_YAML" > src/config.yaml

      - name: Run auto review fixer
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: cd src && python auto_fixer.py --config config.yaml
