name: Run auto review

on:
  workflow_dispatch:

concurrency:
  group: run-auto-review
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-auto-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Precheck review targets
        id: precheck
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPOS: ${{ vars.REPOS }}
        run: python src/ci_precheck.py

      - name: Early exit when no review targets
        if: steps.precheck.outputs.should_run != 'true'
        run: |
          echo "No review targets found. Skipping auto review run."
          echo "has_open_pr=${{ steps.precheck.outputs.has_open_pr }}"
          echo "has_review_target=${{ steps.precheck.outputs.has_review_target }}"

      - name: Display detected PRs
        if: steps.precheck.outputs.should_run == 'true'
        run: |
          echo "Detected review targets:"
          echo '${{ steps.precheck.outputs.target_prs }}' | sed 's/^/  - /'

      - uses: actions/setup-python@v5
        if: steps.precheck.outputs.should_run == 'true'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - if: steps.precheck.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Install Claude CLI
        if: steps.precheck.outputs.should_run == 'true'
        run: npm install -g @anthropic-ai/claude-code@2.1.58

      - name: Configure git credentials
        if: steps.precheck.outputs.should_run == 'true'
        run: git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Run auto review fixer
        if: steps.precheck.outputs.should_run == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPOS: ${{ vars.REPOS }}
          REFIX_TURSO_DATABASE_URL: ${{ secrets.REFIX_TURSO_DATABASE_URL }}
          REFIX_TURSO_AUTH_TOKEN: ${{ secrets.REFIX_TURSO_AUTH_TOKEN }}
        run: cd src && python auto_fixer.py
