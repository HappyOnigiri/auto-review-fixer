name: Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: pip install -r requirements.txt
      - name: Run CI checks
        run: make ci
      - name: Ensure make ci has no diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::make ci generated file changes. Please run make ci locally and commit the result."
            git status --short
            git --no-pager diff
            exit 1
          fi
