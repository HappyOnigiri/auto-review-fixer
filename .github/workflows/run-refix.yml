name: Run Refix

on:
  check_suite:
    types: [completed]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      pr-number:
        description: "PR number to process (leave empty to process all labeled PRs)"
        required: false
        type: number

concurrency:
  group: run-refix-pr-${{ github.event.pull_request.number || github.event.check_suite.pull_requests[0].number || github.event.issue.number || inputs['pr-number'] || github.event_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-refix:
    # Dependabot PRs lack access to secrets, so Refix cannot run.
    if: |
      github.actor != 'dependabot[bot]' &&
      (github.event_name == 'schedule' ||
      ((github.event_name != 'check_suite' || (github.event.check_suite.pull_requests && github.event.check_suite.pull_requests[0] != null)) &&
      !(github.event_name == 'pull_request' && github.event.pull_request.state == 'closed') &&
      (github.event_name != 'issue_comment' || github.event.issue.pull_request != null)))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      # NOTE: `uses: ./` references the checked-out action.yml on the current branch,
      # enabling testing of unreleased changes within this repository.
      # When using this file as a template in another repository,
      # change `./` to `HappyOnigiri/Refix@main` (or a specific version tag).
      - name: Run Refix
        uses: ./
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          config-yaml: ${{ vars.REFIX_CONFIG_YAML }}
