name: Run Refix

on:
  check_suite:
    types: [completed]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'PR number to process'
        required: true
        type: number

concurrency:
  group: run-refix-pr-${{ github.event.pull_request.number || github.event.check_suite.pull_requests[0].number || github.event.issue.number || inputs.pr-number || 'dispatch' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-refix:
    if: github.event_name != 'check_suite' || github.event.check_suite.pull_requests[0].number != 0
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # NOTE: `uses: ./` references the checked-out action.yml on the current branch,
      # enabling testing of unreleased changes within this repository.
      # When using this file as a template in another repository,
      # change `./` to `HappyOnigiri/Refix@main` (or a specific version tag).
      - name: Run Refix
        uses: ./
        with:
          gh-token: ${{ secrets.GH_TOKEN }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          config-yaml: ${{ vars.REFIX_CONFIG_YAML }}
          # Use current branch code for self-testing; remove this line when copying to other repos.
          ref: ${{ github.event_name != 'check_suite' && github.head_ref || github.ref_name }}
