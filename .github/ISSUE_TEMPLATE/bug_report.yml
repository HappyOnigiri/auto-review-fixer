name: Bug report
description: Report a reproducible problem in refix
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for us to reproduce and investigate it quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Please list the exact steps.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Share the relevant parts of `.refix.yaml` after redacting secrets.
      render: yaml
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste terminal output, workflow logs, or screenshots if available.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: What version, branch, or commit are you using?
      placeholder: main / v1.2.3 / abc1234
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and execution context.
      placeholder: ubuntu-latest, Python 3.12, GitHub Actions
