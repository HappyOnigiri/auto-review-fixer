name: Feature request (日本語)
description: refix の改善案を提案する
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        ご提案ありがとうございます。問題の明確な記述と期待する結果があると、リクエストの評価がスムーズになります。
  - type: textarea
    id: problem
    attributes:
      label: 解決したい問題
      description: どのような課題や制限に対処したいですか？
      placeholder: refix に ... してほしい
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案する解決策
      description: 実現したい動作を説明してください。
      placeholder: ... のサポートを追加
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 回避策や他のアプローチがあれば記載してください。
  - type: textarea
    id: use_cases
    attributes:
      label: ユースケース
      description: この機能が役立つ具体的なシナリオを共有してください。
      placeholder: |
        - CI で ...
        - マルチリポジトリ構成で ...
  - type: textarea
    id: extra
    attributes:
      label: 補足情報
      description: リンク、モックアップ、ログ、その他の参考情報。
