# ==========================================
# Refix Project Configuration File
# ==========================================
#
# Place this file as `.refix-project.yaml` in the root of the TARGET repository
# (i.e., the repository being managed by Refix, not the Refix repository itself).
#
# Refix reads this file when it clones or updates the target repository and
# runs the commands defined under `setup.commands`.

# Schema version (Required)
# Currently only version 1 is supported.
version: 1

# Setup commands (Optional)
# Commands to run after cloning or updating the repository.
setup:

  # When to run setup commands (Optional)
  # - "always"     : run on every clone AND every update (default)
  # - "clone_only" : run only on the first clone, skip on subsequent updates
  when: always

  # List of shell commands to execute (Optional)
  # Commands are executed with `sh -c` in the repository root.
  # Each command has a 300-second timeout.
  # If a command fails, subsequent commands are not executed.
  commands:
    - run: npm install
      name: Install Node.js dependencies

    - run: pip install -r requirements.txt
      name: Install Python dependencies

    # `name` is optional — you can omit it if the `run` command is self-explanatory.
    - run: make generate
