name: "Refix"
description: "Automatically fix CodeRabbit review comments using Claude"

branding:
  icon: "check-circle"
  color: "green"

inputs:
  version:
    description: "Refix action version (for tracking)"
    required: false
    default: "1"
  pr-number:
    description: "PR number (optional; auto-detected from event if omitted)"
    required: false
    default: ""
  repo:
    description: "Repository (owner/repo)"
    required: false
    default: "${{ github.repository }}"
  gh-token:
    description: "GitHub token with write access to the target repository"
    required: true
  claude-code-oauth-token:
    description: "Claude Code OAuth token"
    required: true
  batch:
    description: "Run in batch mode (scans all repos from config)"
    required: false
    default: "false"
  ref:
    description: "Ref (tag, branch, or SHA) of HappyOnigiri/Refix to check out"
    required: false
    default: "v1"
  dry-run:
    description: "Run without making changes"
    required: false
    default: "false"
  config-yaml:
    description: "Single-mode YAML config content (optional; written to file internally)"
    required: false
    default: ""
  config-batch-yaml:
    description: "Batch-mode YAML config content (optional; written to file internally)"
    required: false
    default: ""
  claude-code-version:
    description: "Claude Code CLI version"
    required: false
    default: "2.1.58"

runs:
  using: "composite"
  steps:
    - name: Checkout Refix
      id: checkout-refix
      continue-on-error: true
      uses: actions/checkout@v4
      with:
        repository: HappyOnigiri/Refix
        path: .refix-tool
        ref: ${{ inputs.ref }}
        token: ${{ inputs.gh-token }}

    - name: Warn on fallback checkout
      if: steps.checkout-refix.outcome == 'failure'
      run: echo "::warning::Checkout of ref '${{ inputs.ref }}' failed. Falling back to 'main' branch."
      shell: bash

    - name: Checkout Refix (fallback to main)
      if: steps.checkout-refix.outcome == 'failure'
      uses: actions/checkout@v4
      with:
        repository: HappyOnigiri/Refix
        path: .refix-tool
        ref: main
        token: ${{ inputs.gh-token }}

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: .refix-tool/requirements.txt

    - name: Install Python dependencies
      run: pip install -r .refix-tool/requirements.txt
      shell: bash

    - name: Generate single-mode config
      if: inputs.config-yaml != ''
      run: printf '%s\n' "$REFIX_CONFIG_YAML" > "$RUNNER_TEMP/.refix.yaml"
      shell: bash
      env:
        REFIX_CONFIG_YAML: ${{ inputs.config-yaml }}

    - name: Generate batch config
      if: inputs.config-batch-yaml != ''
      run: printf '%s\n' "$REFIX_CONFIG_BATCH_YAML" > "$RUNNER_TEMP/.refix-batch.yaml"
      shell: bash
      env:
        REFIX_CONFIG_BATCH_YAML: ${{ inputs.config-batch-yaml }}

    - name: Filter event
      id: filter
      if: github.event_name == 'issue_comment'
      run: |
        CONFIG_PATH="${{ inputs.config-yaml != '' && format('{0}/.refix.yaml', runner.temp) || '' }}"
        if [ -z "$CONFIG_PATH" ] && [ -f "$GITHUB_WORKSPACE/.refix.yaml" ]; then
          CONFIG_PATH="$GITHUB_WORKSPACE/.refix.yaml"
        fi
        REFIX_CONFIG_PATH="$CONFIG_PATH" python .refix-tool/src/filter_event.py
      shell: bash

    - name: Install Claude Code CLI
      if: steps.filter.outputs.skip != 'true'
      run: npm install -g @anthropic-ai/claude-code@${{ inputs.claude-code-version }}
      shell: bash

    - name: Configure git to use token
      if: steps.filter.outputs.skip != 'true'
      run: |
        git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}

    - name: Run Refix
      if: steps.filter.outputs.skip != 'true'
      run: |
        cd .refix-tool/src
        if [ "${{ inputs.batch }}" = "true" ]; then
          ARGS=()
        elif [ -n "${{ inputs.pr-number }}" ]; then
          ARGS=("--repo" "${{ inputs.repo }}" "--pr" "${{ inputs.pr-number }}")
        else
          ARGS=("--action" "--repo" "${{ inputs.repo }}")
        fi
        if [ "${{ inputs.dry-run }}" = "true" ]; then ARGS+=("--dry-run"); fi
        if [ "${{ inputs.batch }}" = "true" ]; then
          CONFIG_PATH="${{ inputs.config-batch-yaml != '' && format('{0}/.refix-batch.yaml', runner.temp) || '' }}"
        else
          CONFIG_PATH="${{ inputs.config-yaml != '' && format('{0}/.refix.yaml', runner.temp) || '' }}"
        fi
        if [ -z "$CONFIG_PATH" ]; then
          if [ "${{ inputs.batch }}" = "true" ]; then
            [ -f "$GITHUB_WORKSPACE/.refix-batch.yaml" ] && CONFIG_PATH="$GITHUB_WORKSPACE/.refix-batch.yaml"
          else
            [ -f "$GITHUB_WORKSPACE/.refix.yaml" ] && CONFIG_PATH="$GITHUB_WORKSPACE/.refix.yaml"
          fi
        fi
        if [ -n "$CONFIG_PATH" ]; then ARGS+=("--config" "$CONFIG_PATH"); fi
        python auto_fixer.py "${ARGS[@]}"
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude-code-oauth-token }}
