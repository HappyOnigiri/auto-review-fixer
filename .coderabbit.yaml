# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "ja-JP"
tone_instructions: "PRのサマリー、レビューコメント、およびAIエージェント向けプロンプトはすべて日本語で提供してください。"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  sequence_diagrams: false
  collapse_walkthrough: true
  review_status: true
  enable_prompt_for_ai_agents: true
  in_progress_fortune: false
  path_filters:
    - "**"
    - "!.venv/**"
    - "!.pytest_cache/**"
    - "!**/__pycache__/**"
    - "!**/*.py[cod]"
    - "!data/**"
    - "!tmp/**"
    - "!works/**"
    - "!.claude/**"
    - "!.env"
    - "!.env.*"
    - "!repos.txt"

  tools:
    ruff:
      enabled: true
    actionlint:
      enabled: true
    checkmake:
      enabled: true
    yamllint:
      enabled: true
    markdownlint:
      enabled: true
    shellcheck:
      enabled: true
    gitleaks:
      enabled: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 0
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "DRAFT"
