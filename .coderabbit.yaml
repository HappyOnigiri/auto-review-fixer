# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "ja-JP"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  sequence_diagrams: false
  collapse_walkthrough: true
  review_status: true
  enable_prompt_for_ai_agents: true
  in_progress_fortune: false
  path_instructions:
    - path: "**/*"
      instructions: |
        「今のところは許容できるが、将来的には対応したほうがよい」といったニュアンスのレビューコメントは投稿しないでください。
        本当に問題があり、対応が必要な事項のみを指摘してください。
        将来の改善に関するアドバイスや優先度の低い提案は避けてください。
        コードのフォーマットや軽微なリファクタリングに関する指摘は行わないでください。
        ただし、重要な洞察や論理的な問題が含まれる場合、「Nitpick」としての指摘は許可します。

  path_filters:
    - "**"
    - "!.venv/**"
    - "!.pytest_cache/**"
    - "!**/__pycache__/**"
    - "!**/*.py[cod]"
    - "!data/**"
    - "!tmp/**"
    - "!works/**"
    - "!.claude/**"
    - "!.env"
    - "!.env.*"
    - "!repos.txt"

  tools:
    actionlint:
      enabled: true
    biome:
      enabled: false
    blinter:
      enabled: false
    brakeman:
      enabled: false
    buf:
      enabled: false
    checkmake:
      enabled: true
    checkov:
      enabled: false
    circleci:
      enabled: false
    clang:
      enabled: false
    clippy:
      enabled: false
    cppcheck:
      enabled: false
    detekt:
      enabled: false
    dotenvLint:
      enabled: false
    emberTemplateLint:
      enabled: false
    eslint:
      enabled: false
    flake8:
      enabled: false
    fortitudeLint:
      enabled: false
    github-checks:
      enabled: false
    gitleaks:
      enabled: true
    golangci-lint:
      enabled: false
    hadolint:
      enabled: false
    htmlhint:
      enabled: false
    languagetool:
      enabled: false
    luacheck:
      enabled: false
    markdownlint:
      enabled: true
    opengrep:
      enabled: false
    osvScanner:
      enabled: false
    oxc:
      enabled: false
    phpcs:
      enabled: false
    phpmd:
      enabled: false
    phpstan:
      enabled: false
    pmd:
      enabled: false
    prismaLint:
      enabled: false
    psscriptanalyzer:
      enabled: false
    pylint:
      enabled: false
    regal:
      enabled: false
    rubocop:
      enabled: false
    ruff:
      enabled: true
    semgrep:
      enabled: false
    shellcheck:
      enabled: true
    shopifyThemeCheck:
      enabled: false
    smartyLint:
      enabled: false
    sqlfluff:
      enabled: false
    stylelint:
      enabled: false
    swiftlint:
      enabled: false
    tflint:
      enabled: false
    trivy:
      enabled: false
    trufflehog:
      enabled: false
    yamllint:
      enabled: true

  auto_review:
    enabled: true
    drafts: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 0
