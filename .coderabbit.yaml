# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "ja-JP"
tone_instructions: "PRのサマリー、レビューコメント、およびAIエージェント向けプロンプトはすべて日本語で提供してください。"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  sequence_diagrams: false
  collapse_walkthrough: true
  review_status: true
  enable_prompt_for_ai_agents: true
  in_progress_fortune: false
  path_filters:
    - "**"
    - "!.venv/**"
    - "!.pytest_cache/**"
    - "!**/__pycache__/**"
    - "!**/*.py[cod]"
    - "!data/**"
    - "!tmp/**"
    - "!works/**"
    - "!.claude/**"
    - "!.env"
    - "!.env.*"
    - "!repos.txt"

  tools:
    actionlint:
      enabled: true
    ast-grep:
      enabled: false
    biome:
      enabled: false
    blinter:
      enabled: false
    brakeman:
      enabled: false
    buf:
      enabled: false
    checkmake:
      enabled: true
    checkov:
      enabled: false
    circleci:
      enabled: false
    clang:
      enabled: false
    clippy:
      enabled: false
    cppcheck:
      enabled: false
    detekt:
      enabled: false
    dotenvLint:
      enabled: false
    emberTemplateLint:
      enabled: false
    eslint:
      enabled: false
    flake8:
      enabled: false
    fortitudeLint:
      enabled: false
    github-checks:
      enabled: false
    gitleaks:
      enabled: true
    golangci-lint:
      enabled: false
    hadolint:
      enabled: false
    htmlhint:
      enabled: false
    languagetool:
      enabled: false
    luacheck:
      enabled: false
    markdownlint:
      enabled: true
    opengrep:
      enabled: false
    osvScanner:
      enabled: false
    oxc:
      enabled: false
    phpcs:
      enabled: false
    phpmd:
      enabled: false
    phpstan:
      enabled: false
    pmd:
      enabled: false
    prismaLint:
      enabled: false
    psscriptanalyzer:
      enabled: false
    pylint:
      enabled: false
    regal:
      enabled: false
    rubocop:
      enabled: false
    ruff:
      enabled: true
    semgrep:
      enabled: false
    shellcheck:
      enabled: true
    shopifyThemeCheck:
      enabled: false
    smartyLint:
      enabled: false
    sqlfluff:
      enabled: false
    stylelint:
      enabled: false
    swiftlint:
      enabled: false
    tflint:
      enabled: false
    trivy:
      enabled: false
    trufflehog:
      enabled: false
    yamllint:
      enabled: true

  auto_review:
    enabled: true
    drafts: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 0
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "DRAFT"
